spring.application.name=order
server.port = 8080

# PostgreSQL datasource - update username/password/db name as needed
spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=Nil@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection pool (optional tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JWT settings
jwt.secret=your-secret-key-your-secret-key-keep-it-safe-dont-share-it

resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=2000
circuitbreaker.instances.inventoryService.sliding-window-size=10
circuitbreaker.instances.inventoryService.failure-rate-threshold=50
circuitbreaker.instances.inventoryService.wait-duration-in-open-state=5000
timelimiter.instances.inventoryService.timeout-duration=3000
